x-remote-base: &remote
  image: back-remote-prod-build:latest
  working_dir: /app
  env_file:
    - ../cmd/remote/env/.env
    - ../cmd/remote/env/.env.local

services:
  back-central-prod:
    build:
      context: ..
      dockerfile: docker/Dockerfile-backend-central.prod
    container_name: back-central-prod
    working_dir: /app
    ports:
      - "8080:8080"
    env_file:
      - ../cmd/central/env/.env
      - ../cmd/central/env/.env.local
    environment:
      - APP_PORT=8080
      - APP_NAME=Production Central

  back-remote-prod-1:
    <<: *remote
    container_name: back-remote-prod-1
    ports:
      - "8081:8081"
    environment:
      - APP_PORT=8081
      - APP_NAME=Production Remote-1

  back-remote-prod-2:
    <<: *remote
    container_name: back-remote-prod-2
    ports:
      - "8082:8082"
    environment:
      - APP_PORT=8082
      - APP_NAME=Production Remote-2

