jetstream {
  store_dir: /data/jetstream
  max_mem_store: 1Gb
  max_file_store: 10Gb
  domain: "leaf1"
}

debug: true
trace: true
http_port: 8222

leafnodes {
  remotes = [
    {
      url: "nats-leaf://nats-hub:7422"
