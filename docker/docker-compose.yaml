services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile-server.dev
    container_name: server-dev
    working_dir: /app
    ports:
      - "8080:8080"
    env_file:
      - ../cmd/server/env/.env
      - ../cmd/server/env/.env.local
    volumes:
      - ../cmd/server:/app/cmd/server
      # - /app/cmd/server/env  # exclide env files
      - ../internal/api/server:/app/internal/api/server
      - ../pkg:/app/pkg
      - ../docker/.air-server-docker.toml:/app/.air-server-docker.toml

