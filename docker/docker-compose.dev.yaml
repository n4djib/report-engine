x-remote-base: &remote
   build:
     context: ..
     dockerfile: docker/Dockerfile-remote.dev
   working_dir: /app
   env_file:
     - ../cmd/remote/env/.env
     - ../cmd/remote/env/.env.local
   volumes:
     - ../cmd/remote:/app/cmd/remote
     - /app/cmd/remote/env  # exclude env files
     - ../internal/api/remote:/app/internal/api/remote
     - ../internal/vars/remote:/app/internal/vars/remote
     - ../pkg:/app/pkg
     - ../docker/.air-remote-docker.toml:/app/.air-remote-docker.toml

