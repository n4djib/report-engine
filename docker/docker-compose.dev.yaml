x-back-remote-dev-base: &back-remote
  image: back-remote-dev-build:latest
  working_dir: /app
  env_file:
    - ../cmd/remote/env/.env.local
  volumes:
    - ../cmd/remote:/app/cmd/remote
    - /app/cmd/remote/env # exclude env files
    - ../cmd/remote/env/.env:/app/cmd/remote/env/.env
    - ../internal/api/remote:/app/internal/api/remote
    - ../internal/vars/remote:/app/internal/vars/remote
    - ../pkg:/app/pkg
    - ../docker/.air-remote-docker.toml:/app/.air-remote-docker.toml
      - ../internal/embed:/app/internal/embed

x-front-dev-base: &front
  image: front-dev-build:latest
  volumes:
    - ../web:/app
    - /app/node_modules

services:
  back-central-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile-backend-central.dev
    container_name: back-central-dev
    working_dir: /app
    ports:
      - "8080:8080"
    env_file:
      - ../cmd/central/env/.env.local
    environment:
      - APP_PORT=8080
      - APP_NAME=Development Central
    volumes:
      - ../cmd/central/main.go:/app/cmd/central/main.go
      - ../cmd/central/app.go:/app/cmd/central/app.go
      - /app/cmd/central/env # exclide env files
      - ../cmd/central/env/.env:/app/cmd/central/env/.env
      - ../internal/api/central:/app/internal/api/central
      - ../internal/vars/central:/app/internal/vars/central
      - ../pkg:/app/pkg
      # FIXME remove ../docker
      - ../docker/.air-central-docker.toml:/app/.air-central-docker.toml
      - ../internal/embed:/app/internal/embed

  # back-remote-dev-1:
  #   <<: *back-remote
  #   container_name: back-remote-dev-1
  #   environment:
  #     - APP_PORT=8081
  #     - APP_NAME=Development Remote-1
  #   ports:
