  #   environment:
  #     - APP_PORT=8082
  #     - APP_NAME=Development Remote-2
  #   ports:
  #     - "8082:8082"

  front-central-dev:
    <<: *front
    container_name: front-central-dev
    ports:
      - "3000:3000"
    command: >
      sh -c "pnpm install && pnpm --filter ./apps/central dev"
    environment:
      - VITE_FRONT_PORT=3000
      - CI=true
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_API_URL=http://back-central-dev:8080 # used in vite proxy
    depends_on:
      - back-central-dev

