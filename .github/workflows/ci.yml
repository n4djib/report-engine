name: CI

on: 
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    name: Test 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true  # Caches module downloads between runs 

      - name: Download dependencies
        run: go mod download

      - name: Vet
        # get vet catches suspicious constructs (misuse of Printf, etc..)
        run: go vet ./... 

      - name: Test with race detector
        # -race enables Go's built-in data race detector
        # It slows tests ~ 5x but catches concurrent access bugs that
        # are nearly impossible to find otherwise
        # -coverprofile produces a coverage report
        run: got test -race -coverprofile=coverage.out ./...

      - name: Show coverage
        run: go tool cover -func=coverage.out | tail -1


  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with: 
        version: latest


  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity medium -quiet ./...

