[databases]

report = host=postgres port=5432  dbname=report-engine


[pgbouncer]
listen_port = 6432
listen_addr = 0.0.0.0
auth_type   = scram-sha-256
auth_file   = /etc/pgbouncer/userlist.txt
pool_mode   = transaction     ; transaction-mode: connection return to pool after each txn
max_client_conn = 300
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
server_reset_query = DISCARD ALL
log_connections = 0
log_disconnections = 0
